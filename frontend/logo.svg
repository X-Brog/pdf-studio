<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6c63ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="doc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c4b5fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#7c3aed" flood-opacity="0.6"/>
    </filter>
    <filter id="innerglow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#8b5cf6" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect x="4" y="4" width="92" height="92" rx="22" ry="22" fill="url(#bg)"/>

  <!-- Purple border glow -->
  <rect x="4" y="4" width="92" height="92" rx="22" ry="22"
        fill="none" stroke="url(#purple)" stroke-width="1.5" opacity="0.6"/>

  <!-- Document body -->
  <path d="M28 20 L56 20 L72 36 L72 78 Q72 82 68 82 L28 82 Q24 82 24 78 L24 24 Q24 20 28 20Z"
        fill="url(#doc)" filter="url(#innerglow)"/>

  <!-- Folded corner dark -->
  <path d="M56 20 L56 36 L72 36Z" fill="#4c1d95" opacity="0.8"/>
  <path d="M56 20 L56 36 L72 36Z" fill="none" stroke="#7c3aed" stroke-width="0.5"/>

  <!-- Text lines -->
  <rect x="31" y="45" width="22" height="2.5" rx="1.25" fill="#4c1d95"/>
  <rect x="31" y="52" width="28" height="2.5" rx="1.25" fill="#4c1d95"/>
  <rect x="31" y="59" width="18" height="2.5" rx="1.25" fill="#4c1d95"/>

  <!-- Glowing star accent -->
  <circle cx="71" cy="69" r="9" fill="#1a0a2e"/>
  <circle cx="71" cy="69" r="9" fill="url(#purple)" opacity="0.9" filter="url(#glow)"/>
  <path d="M71 63.5 L72.4 67.5 L76.5 67.5 L73.3 70 L74.5 74 L71 71.8 L67.5 74 L68.7 70 L65.5 67.5 L69.6 67.5Z"
        fill="white" opacity="1"/>
</svg>
